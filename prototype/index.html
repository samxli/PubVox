<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#15251b">
    <title>PubVox Prototype</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1 class="brand-mark">
            <svg class="brand-wave" viewBox="0 0 30 18" aria-hidden="true" focusable="false">
              <path d="M2 9h3"></path>
              <path d="M9 13V5"></path>
              <path d="M15 16V2"></path>
              <path d="M21 13V5"></path>
              <path d="M27 9h1"></path>
            </svg>
            <span>PubVox</span>
          </h1>
        </div>
        <div class="account-chip" aria-label="Current account">
          <span class="avatar">SL</span>
          <span>Sam's library</span>
        </div>
      </header>

      <main class="layout">
        <section class="hero panel">
          <div>
            <p class="eyebrow">Now listening</p>
            <h2 id="now-title">The Long Way Home</h2>
            <p id="now-meta" class="muted">Chapter 4 - A Rainy Platform</p>
          </div>
          <div class="hero-progress">
            <div class="progress-ring" aria-label="Book progress">
              <span id="book-progress">42%</span>
            </div>
          </div>
        </section>

        <section class="library panel">
          <div class="section-header">
            <div>
              <p class="eyebrow">Library</p>
            </div>
            <button class="secondary-button" type="button" id="sort-toggle">Sort: Recent</button>
          </div>
          <div id="book-list" class="book-list" aria-live="polite"></div>
        </section>

        <aside class="side-stack">
          <section class="panel upload-panel">
            <p class="eyebrow">Add a book</p>
            <p class="muted">Drop in an ePub to add to audiobook library.</p>
            <label class="upload-dropzone">
              <input id="upload-input" type="file" accept=".epub">
              <span>Choose an .epub file</span>
            </label>
            <div id="processing-card" class="processing-card hidden">
              <div class="processing-header">
                <span id="processing-title">Processing</span>
                <span id="processing-percent">0%</span>
              </div>
              <div class="bar">
                <span id="processing-bar"></span>
              </div>
              <p id="processing-step" class="muted">Waiting for upload...</p>
            </div>
          </section>

          <section class="panel chapters-panel">
            <div class="section-header">
              <div>
                <p class="eyebrow">Queue</p>
              </div>
            </div>
            <ol id="chapter-list" class="chapter-list"></ol>
          </section>
        </aside>
      </main>

      <section class="player" aria-label="Audio player">
        <div class="track-meta">
          <span class="cover-mini" aria-hidden="true"></span>
          <div>
            <strong id="player-title">The Long Way Home</strong>
            <span id="player-chapter">Chapter 4 - A Rainy Platform</span>
          </div>
        </div>

        <div class="player-controls">
          <button type="button" id="skip-back" class="skip-button" aria-label="Back 15 seconds">
            <svg viewBox="0 0 48 48" aria-hidden="true" focusable="false">
              <path class="skip-triangle" d="M25 12 13 24l12 12z"></path>
              <path class="skip-triangle" d="M36 12 24 24l12 12z"></path>
              <text x="24" y="42">15</text>
            </svg>
          </button>
          <button type="button" id="play-toggle" class="play-button" aria-label="Play">
            <svg class="play-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M9 7.5v9l7-4.5-7-4.5z"></path>
            </svg>
            <svg class="pause-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M8 7h3v10H8zM13 7h3v10h-3z"></path>
            </svg>
          </button>
          <button type="button" id="skip-forward" class="skip-button" aria-label="Forward 30 seconds">
            <svg viewBox="0 0 48 48" aria-hidden="true" focusable="false">
              <path class="skip-triangle" d="M12 12 24 24 12 36z"></path>
              <path class="skip-triangle" d="M23 12 35 24 23 36z"></path>
              <text x="24" y="42">30</text>
            </svg>
          </button>
        </div>

        <div class="timeline">
          <span id="elapsed">12:44</span>
          <input id="timeline" type="range" min="0" max="100" value="42" aria-label="Playback progress">
          <span id="duration">30:10</span>
        </div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
