name: OpenSSF Scorecard

on:
  branch_protection_rule:
  push:
    branches: ["main"]
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          sarif_file: scorecard.sarif

  scorecard-summary:
    name: Scorecard Summary
    needs: scorecard
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Write Scorecard summary
        shell: bash
        run: |
          results_url="https://api.scorecard.dev/projects/github.com/${GITHUB_REPOSITORY}"
          viewer_url="https://scorecard.dev/viewer/?uri=github.com/${GITHUB_REPOSITORY}"
          code_scanning_url="https://github.com/${GITHUB_REPOSITORY}/security/code-scanning"

          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error "$results_url" --output scorecard.json; then
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              rm -f scorecard.json
              break
            fi

            sleep 10
          done

          {
            echo "## OpenSSF Scorecard"
            echo
            echo "- Repository: \`${GITHUB_REPOSITORY}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Published results: ${viewer_url}"
            echo "- Code scanning alerts: ${code_scanning_url}"
            echo

            if [ -f scorecard.json ]; then
              score="$(jq -r '.score // "unknown"' scorecard.json)"
              scan_date="$(jq -r '.date // "unknown"' scorecard.json)"
              commit="$(jq -r '.repo.commit // "unknown"' scorecard.json)"
              echo "- Score: \`${score}\`"
              echo "- Scan date: \`${scan_date}\`"
              echo "- Result commit: \`${commit}\`"
              echo
              echo "### Checks"
              echo
              echo "| Check | Score | Reason |"
              echo "| --- | --- | --- |"
              jq -r '
                def esc: tostring | gsub("\\|"; "\\|") | gsub("\n"; "<br>");
                .checks[]
                | "| \(.name | esc) | \(.score | esc) | \(.reason | esc) |"
              ' scorecard.json
            else
              echo "Published Scorecard results were not available yet. Use the published results link above."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

